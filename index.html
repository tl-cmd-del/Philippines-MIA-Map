<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Philippines MIA Map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,.3);
            font-family: Arial, sans-serif;
        }
        #stats-button {
    width: 100%;
    cursor: pointer;
    font-size: 14px;
    padding: 5px;
    margin-bottom: 5px;
}

    .search-box {
    position: absolute;
    top: 60px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,.3);
}

.search-box input {
    width: 140px;
}
    </style>
    <link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>

<body>

<div class="search-box">
    <input type="text"
           id="searchInput"
           placeholder="Search surname...">

    <button onclick="searchMember()">
        Search
    </button>
</div>
    
<div class="info-box">

<button onclick="toggleStats()" id="stats-button">
▼ Statistics
</button>

<div id="stats-content">

<h3>Philippines MIA Map</h3>

<p>Total Records: <span id="totalRecords">0</span></p>

<p>🟢 Active Pursuit: <span id="activePursuit">0</span></p>
<p>⚫ Non-Recoverable: <span id="nonRecoverable">0</span></p>

<p>🔵 Relative Location Known: <span id="relativeKnown">0</span></p>
<p>🔴 Relative Location Unknown: <span id="relativeUnknown">0</span></p>

<hr>

<b>Legend</b><br>

🟢 Active Pursuit<br>
⚫ Non-Recoverable<br>
🟡 Deferred<br>
🟠 Under Review<br>
🔴 Relative Location Unknown    
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>    
<script>

var map = L.map('map').setView([12.8797, 121.7740], 6);

   var markers = L.markerClusterGroup(); 
    var totalRecords = 0;

var activePursuit = 0;
var nonRecoverable = 0;
var deferred = 0;
var underReview = 0;

var relativeKnown = 0;
var relativeUnknown = 0;
var unknownLocationMembers = []; 
var serviceMembers = {};
L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);
// ACTIVE PURSUIT (GREEN)

    var greenIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});

var blackIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-black.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});

var yellowIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});

var orangeIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});

var redIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34]
});
var arrington = L.marker([13.95,122.30], {icon: greenIcon});
serviceMembers["arrington"] = arrington;
markers.addLayer(arrington);
arrington.bindPopup(
"<b>Pvt Carroll J. Arrington</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Near Calauag and Basiad River<br>" +
"Relative Location: Known<br><br>" +
"<a href='https://dpaa-mil.sites.crmforce.mil/dpaaProfile?id=a0Jt000001Hu1pyEAB' target='_blank'>Open DPAA Profile</a>"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;

var abel = L.marker([15.5108,121.0378], {icon: greenIcon});
serviceMembers["abel"] = abel;
markers.addLayer(abel);
abel.bindPopup(
"<b>TEC 4 Charles E. Abel</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp<br>" +
"Relative Location: Known<br><br>" +
"No DPAA Profile Available"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;
    
var carey = L.marker([14.62, 120.58], {icon: greenIcon});
serviceMembers["carey"] = carey;
markers.addLayer(carey);
carey.bindPopup(
"<b>Pvt Murl J. Carey</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Orion<br>" +
"Relative Location: Known<br><br>" +
"<a href='https://dpaa-mil.sites.crmforce.mil/dpaaProfile?id=a0Jt000001nI58nEAC' target='_blank'>Open DPAA Profile</a>"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;
    
var bodrero = L.marker([7.85, 123.15], {icon: greenIcon});
serviceMembers["bodrero"] = bodrero;
markers.addLayer(bodrero);
bodrero.bindPopup(
"<b>Staff Sgt Glen L. Bodrero</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Zamboanga Mountains<br>" +
"Relative Location: Known<br><br>" +
"<a href='https://dpaa-mil.sites.crmforce.mil/dpaaProfile?id=a0Jt0000000XmNzEAK' target='_blank'>Open DPAA Profile</a>"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;
    
var barlow = L.marker([15.5108, 121.0378], {icon: greenIcon});
serviceMembers["barlow"] = barlow;
markers.addLayer(barlow);
barlow.bindPopup(
"<b>Sea1 Woods R. Barlow</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp<br>" +
"Relative Location: Known<br><br>" +
"<a href='https://dpaa-mil.sites.crmforce.mil/dpaaProfile?id=a0Jt0000000XdeJEAS' target='_blank'>Open DPAA Profile</a>"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;
    
var brown = L.marker([15.5108, 121.0378], {icon: greenIcon});
serviceMembers["brown"] = brown;
markers.addLayer(brown);
brown.bindPopup(
"<b>Pvt Vincent C. Brown</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp<br>" +
"Relative Location: Known<br><br>" +
"<a href='https://dpaa-mil.sites.crmforce.mil/dpaaProfile?id=a0Jt0000000Qrg2EAC' target='_blank'>Open DPAA Profile</a>"
);
    
activePursuit++;
relativeKnown++;
totalRecords++;
    
// NON-RECOVERABLE (BLACK)

var amp = L.marker([11.05,124.40], {icon: blackIcon});
serviceMembers["amp"] = amp;
markers.addLayer(amp);
amp.bindPopup(
"<b>Sea2 Charles H. Amp</b><br>" +
"Status: Non-Recoverable<br>" +
"Location: West Side of Leyte Island<br>" +
"Relative Location: Known<br><br>" +
"No DPAA Profile Available"
);
    
nonRecoverable++;
relativeKnown++;
totalRecords++;

// RELATIVE LOCATION UNKNOWN (RED OFFSHORE MARKER)

var unknown = L.marker([14.5,118.5], {icon: redIcon});
markers.addLayer(unknown);


nonRecoverable++;
relativeUnknown++;
totalRecords++;
    
    unknownLocationMembers.push(
"S1C Stanley J. Abcunas"
);
    

    
unknown.bindPopup(
"<b>Relative Location Unknown</b><br>" +
relativeUnknown +
" Service Member(s)<br><br>" +
"• " + unknownLocationMembers.join("<br>• ")
);
    
    

document.getElementById("totalRecords").textContent = totalRecords;

document.getElementById("activePursuit").textContent = activePursuit;

document.getElementById("nonRecoverable").textContent = nonRecoverable;

document.getElementById("relativeKnown").textContent = relativeKnown;

document.getElementById("relativeUnknown").textContent = relativeUnknown;

map.addLayer(markers);
    
</script>

<script>

function toggleStats() {

    var stats = document.getElementById("stats-content");
    var button = document.getElementById("stats-button");

    if (stats.style.display === "none") {

        stats.style.display = "block";
        button.innerHTML = "▼ Statistics";

    } else {

        stats.style.display = "none";
        button.innerHTML = "▶ Statistics";

    }

}

function searchMember() {

    var searchText =
        document.getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();

    if (serviceMembers[searchText]) {

        var marker = serviceMembers[searchText];

        map.setView(
            marker.getLatLng(),
            12
        );

        marker.openPopup();

    } else {

        alert("Service member not found.");

    }

}

</script>
</body>
</html>
