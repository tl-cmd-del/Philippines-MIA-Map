<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Philippines MIA Map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,.3);
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

<div class="info-box">
    <h3>Philippines MIA Map</h3>
    <p>Total Records: 8</p>

<p>🟢 Active Pursuit: 6</p>
<p>⚫ Non-Recoverable: 2</p>

<p>⚪️ Relative Location Known: 7</p>
<p>🔴 Relative Location Unknown: 1</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([12.8797, 121.7740], 6);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);
// ACTIVE PURSUIT (GREEN)

var arrington = L.marker([13.95, 122.30]).addTo(map);
arrington.bindPopup(
"<b>Pvt. Carroll J. Arrington</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Near Calauag and Basiad River"
);

var abel = L.marker([15.49, 120.97]).addTo(map);
abel.bindPopup(
"<b>TEC 4 Charles E. Abel</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp"
);

var carey = L.marker([14.62, 120.58]).addTo(map);
carey.bindPopup(
"<b>Pvt Murl J. Carey</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Orion"
);

var bodrero = L.marker([7.20, 125.00]).addTo(map);
bodrero.bindPopup(
"<b>Staff Sgt Glen L. Bodrero</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Mindanao Island"
);

var barlow = L.marker([15.49, 120.97]).addTo(map);
barlow.bindPopup(
"<b>Sea1 Woods R. Barlow</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp"
);

var brown = L.marker([15.49, 120.97]).addTo(map);
brown.bindPopup(
"<b>Pvt Vincent C. Brown</b><br>" +
"Status: Active Pursuit<br>" +
"Location: Cabanatuan Prison Camp"
);

// NON-RECOVERABLE (BLACK)

var amp = L.marker([11.05, 124.40]).addTo(map);
amp.bindPopup(
"<b>Sea2 Charles H. Amp</b><br>" +
"Status: Non-Recoverable<br>" +
"Location: West Side of Leyte Island"
);

// RELATIVE LOCATION UNKNOWN (RED OFFSHORE MARKER)

var unknown = L.marker([14.5, 118.5]).addTo(map);
unknown.bindPopup(
"<b>Relative Location Unknown</b><br>" +
"1 Service Member<br><br>" +
"S1C Stanley J. Abcunas<br>" +
"Status: Non-Recoverable"
);


</script>

</body>
</html>
