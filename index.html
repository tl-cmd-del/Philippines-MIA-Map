<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Philippines MIA Map</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info-box {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,.3);
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

<div class="info-box">
    <h3>Philippines MIA Map</h3>
    <p>Total Records: 3</p>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([12.8797, 121.7740], 6);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap contributors'
    }
).addTo(map);

var marker1 = L.marker([14.5995, 120.9842]).addTo(map);

marker1.bindPopup(
    "<b>John Smith</b><br>" +
    "Status: Active Pursuit<br>" +
    "<a href='https://dpaa-mil.sites.crmforce.mil/dpaaOurMissing' target='_blank'>DPAA Record</a>"
);

var marker2 = L.marker([10.3157, 123.8854]).addTo(map);

marker2.bindPopup(
    "<b>James Jones</b><br>" +
    "Status: Deferred<br>" +
    "<a href='https://dpaa-mil.sites.crmforce.mil/dpaaOurMissing' target='_blank'>DPAA Record</a>"
);

var marker3 = L.marker([16.4023, 120.5960]).addTo(map);

marker3.bindPopup(
    "<b>Robert Brown</b><br>" +
    "Status: Under Review<br>" +
    "<a href='https://dpaa-mil.sites.crmforce.mil/dpaaOurMissing' target='_blank'>DPAA Record</a>"
);

</script>

</body>
</html>
