<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Auto Philippines MIA Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
}

#map {
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([12.8797,121.7740],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTJnh83mbPcdblXJZsSJv69JkEXEUUK0UQlyB6Vljf1xJN2vN0PRMQtQZ2NtEnjkhjYb6GCGniFbyii/pub?output=csv")

.then(response => response.text())

.then(csv => {

    const rows = csv.split("\n");

    for(let i = 1; i < rows.length; i++) {

        const cols = rows[i].split(",");

        if(cols.length < 9) continue;

        const rank = cols[0];
        const firstName = cols[1];
        const lastName = cols[2];
        const location = cols[3];
        const relativeLocation = cols[4];
        const status = cols[5];
        const dpaaLink = cols[6];
        const latitude = parseFloat(cols[7]);
        const longitude = parseFloat(cols[8]);

        if(isNaN(latitude) || isNaN(longitude))
            continue;

        var marker = L.marker([latitude, longitude]);

        marker.bindPopup(
            "<b>" + rank + " " +
            firstName + " " +
            lastName + "</b><br>" +

            "Status: " + status + "<br>" +
            "Location: " + location + "<br>" +
            "Relative Location: " +
            relativeLocation + "<br><br>" +

            "<a href='" + dpaaLink +
            "' target='_blank'>🔗 Open DPAA Profile</a>"
        );

        marker.addTo(map);
    }

});

</script>

</body>
</html>
