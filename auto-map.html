<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Auto Philippines MIA Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
}

#map {
    height: 100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([12.8797,121.7740],6);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

var greenIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var blackIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-black.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var yellowIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var orangeIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var redIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});
    
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTJnh83mbPcdblXJZsSJv69JkEXEUUK0UQlyB6Vljf1xJN2vN0PRMQtQZ2NtEnjkhjYb6GCGniFbyii/pub?output=csv")

.then(response => response.text())

.then(csv => {

    const rows = csv.split("\n");

    for(let i = 1; i < rows.length; i++) {

        const cols = rows[i].split(",");

        if(cols.length < 9) continue;

        const rank = cols[0];
        const firstName = cols[1];
        const lastName = cols[2];
        const location = cols[3];
        const relativeLocation = cols[4];
        const status = cols[5];
        const dpaaLink = cols[6];
        const latitude = parseFloat(cols[7]);
        const longitude = parseFloat(cols[8]);

        if(isNaN(latitude) || isNaN(longitude))
            continue;

       var markerIcon = greenIcon;

if(status.toLowerCase().includes("non-recoverable"))
    markerIcon = blackIcon;

if(status.toLowerCase().includes("deferred"))
    markerIcon = yellowIcon;

if(status.toLowerCase().includes("under review"))
    markerIcon = orangeIcon;

if(relativeLocation.toLowerCase() === "no")
    markerIcon = redIcon;

var marker = L.marker(
    [latitude, longitude],
    {icon: markerIcon}
);

        marker.bindPopup(
            "<b>" + rank + " " +
            firstName + " " +
            lastName + "</b><br>" +

            "Status: " + status + "<br>" +
            "Location: " + location + "<br>" +
            "Relative Location: " +
            relativeLocation + "<br><br>" +

            "<a href='" + dpaaLink +
            "' target='_blank'>🔗 Open DPAA Profile</a>"
        );

        marker.addTo(map);
    }

});

</script>

</body>
</html>
