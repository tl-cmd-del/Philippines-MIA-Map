<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Auto Philippines MIA Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
}

#map {
    height: 100vh;
}
</style>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>

<body>

<div id="statsBox"
style="
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.3);
font-family:Arial;
">

<button id="statsButton"
onclick="toggleStats()"
style="width:100%;margin-bottom:5px;">
▼ Statistics
</button>

<div id="statsContent">
Loading statistics...
</div>

</div>
    <div id="searchBox"
style="
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.3);
">

<input
id="searchInput"
type="text"
placeholder="Search Last Name">

<button onclick="searchPerson()">
Search
</button>

</div>

    <div id="filterBox"
style="
position:absolute;
top:70px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,.3);
font-family:Arial;
">

<b>Filters</b><br><br>

<label>
<input type="checkbox"
id="showActive"
checked
onchange="applyFilters()">
Active Pursuit
</label><br>

<label>
<input type="checkbox"
id="showNonRecoverable"
checked
onchange="applyFilters()">
Non-Recoverable
</label><br>

<label>
<input type="checkbox"
id="showDeferred"
checked
onchange="applyFilters()">
Deferred
</label><br>

<label>
<input type="checkbox"
id="showUnderReview"
checked
onchange="applyFilters()">
Under Review
</label>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>

var map = L.map('map').setView([12.8797,121.7740],6);
var markers = L.markerClusterGroup();
    
L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

var greenIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var blackIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-black.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var yellowIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-gold.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var orangeIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var redIcon = new L.Icon({
    iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
    iconSize:[25,41],
    iconAnchor:[12,41]
});

var totalRecords = 0;

var activePursuit = 0;
var nonRecoverable = 0;
var deferred = 0;
var underReview = 0;

var relativeKnown = 0;
var relativeUnknown = 0; 
    var serviceMembers = {};

   var allMarkers = [];
    
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTJnh83mbPcdblXJZsSJv69JkEXEUUK0UQlyB6Vljf1xJN2vN0PRMQtQZ2NtEnjkhjYb6GCGniFbyii/pub?output=csv")

.then(response => response.text())

.then(csv => {

    const rows = csv.split("\n");

    for(let i = 1; i < rows.length; i++) {

        const cols = rows[i].split(",");

        if(cols.length < 10) continue;

        const rank = cols[0];
const firstName = cols[1];
const lastName = cols[2];
const branch = cols[3];

const location = cols[4];
const relativeLocation = cols[5];
const status = cols[6];
const dpaaLink = cols[7];

const latitude = parseFloat(cols[8]);
const longitude = parseFloat(cols[9]);

totalRecords++;

if(status.toLowerCase().includes("active"))
    activePursuit++;

if(status.toLowerCase().includes("non"))
    nonRecoverable++;

if(status.toLowerCase().includes("deferred"))
    deferred++;

if(status.toLowerCase().includes("under review"))
    underReview++;

if(relativeLocation.toLowerCase() === "yes")
    relativeKnown++;
else
    relativeUnknown++;
        
        if(isNaN(latitude) || isNaN(longitude))
            continue;

       var markerIcon = greenIcon;

if(status.toLowerCase().includes("non-recoverable"))
    markerIcon = blackIcon;

if(status.toLowerCase().includes("deferred"))
    markerIcon = yellowIcon;

if(status.toLowerCase().includes("under review"))
    markerIcon = orangeIcon;

if(relativeLocation.toLowerCase() === "no")
    markerIcon = redIcon;

var marker = L.marker(
    [latitude, longitude],
    {icon: markerIcon}
);

        marker.bindPopup(
            "<b>" + rank + " " +
            firstName + " " +
            lastName + "</b><br>" +

            "Status: " + status + "<br>" +
            "Location: " + location + "<br>" +
            "Relative Location: " +
            relativeLocation + "<br><br>" +

            "<a href='" + dpaaLink +
            "' target='_blank'>Open DPAA Profile</a>"
        );

       serviceMembers[
    lastName.toLowerCase().trim()
] = marker;

markers.addLayer(marker);

allMarkers.push({
    marker: marker,
    status: status
});
    }
document.getElementById("statsContent").innerHTML =
"<b>Philippines MIA Map</b><br><br>" +

"Total Records: " + totalRecords + "<br><br>" +

"🟢 Active Pursuit: " + activePursuit + "<br>" +
"⚫ Non-Recoverable: " + nonRecoverable + "<br>" +
"🟡 Deferred: " + deferred + "<br>" +
"🟠 Under Review: " + underReview + "<br><br>" +

"🔵 Relative Location Known: " + relativeKnown + "<br>" +
"🔴 Relative Location Unknown: " + relativeUnknown;
   map.addLayer(markers); 
});

function searchPerson() {

    var name =
    document.getElementById("searchInput")
    .value
    .toLowerCase()
    .trim();

    if(serviceMembers[name]) {

        var marker = serviceMembers[name];

        map.setView(
            marker.getLatLng(),
            10
        );

        marker.openPopup();

    }
    else {

        alert("Service member not found");

    }

}  

    function applyFilters() {

    markers.clearLayers();

    var showActive =
    document.getElementById("showActive").checked;

    var showNonRecoverable =
    document.getElementById("showNonRecoverable").checked;

    var showDeferred =
    document.getElementById("showDeferred").checked;

    var showUnderReview =
    document.getElementById("showUnderReview").checked;

    for(let i = 0; i < allMarkers.length; i++) {

        var item = allMarkers[i];

        var status =
        item.status.toLowerCase();

        var visible = false;

        if(showActive &&
           status.includes("active"))
            visible = true;

        if(showNonRecoverable &&
           status.includes("non"))
            visible = true;

        if(showDeferred &&
           status.includes("deferred"))
            visible = true;

        if(showUnderReview &&
           status.includes("under review"))
            visible = true;

        if(visible)
            markers.addLayer(item.marker);

    }

}
   function toggleStats() {

    var content =
    document.getElementById("statsContent");

    var button =
    document.getElementById("statsButton");

    if(content.style.display === "none") {

        content.style.display = "block";
        button.innerHTML = "▼ Statistics";

    } else {

        content.style.display = "none";
        button.innerHTML = "▶ Statistics";

    }

} 
</script>

</body>
</html>
